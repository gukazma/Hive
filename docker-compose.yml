services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: hive
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine

  backend:
    build: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: "host=postgres user=hive password=hive dbname=hive port=5432 sslmode=disable TimeZone=Asia/Shanghai"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "change-me-in-production"
      CORS_ORIGIN: "http://localhost:8000"
      ADMIN_EMAIL: "admin@hive.local"
      ADMIN_PASSWORD: "admin"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8000:80"

volumes:
  pgdata:
